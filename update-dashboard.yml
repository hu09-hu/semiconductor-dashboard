name: Update semiconductor dashboard

on:
  schedule:
    # 17:30 Asia/Taipei = 09:30 UTC
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update dashboard
        run: python scripts/update_semiconductor_dashboard.py

      - name: Commit updated dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update semiconductor dashboard"
          file_pattern: index.html
